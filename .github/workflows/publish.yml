name: Publish to GitHub Packages

# Publishes the package to GitHub Packages when a version tag (e.g. v0.1.0) is
# pushed. Cut a release by bumping the version and pushing the matching tag:
#   npm version patch     # edits package.json + creates the git tag
#   git push --follow-tags
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@peek-travel'

      - name: Install dependencies
        run: npm ci

      - name: Verify the tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test (with coverage gate)
        run: npm run test:coverage

      # `npm publish` runs `prepublishOnly` first: build + publint + attw.
      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
